
<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>לוח בית הכנסת</title>
  <link rel="stylesheet" href="styles.css">
  <style type="text/css">
  .style1 {
	  font-size: large;
  }
  </style>
</head>
<body>
  <a class="adminLink" href="admin.html" title="ניהול" aria-label="ניהול">
  <strong><span class="style1">⚙</span></strong></a><strong>
  <button id="musicButton" class="style1" type="button" title="הפעל או עצור מוזיקה" aria-label="הפעל מוזיקה">▶</button>
  </strong>
  <audio id="music" loop preload="none"></audio>

  <main class="board">
    <div class="top">
      <section class="left">
        <div id="gregDate" class="style1"><strong>--.--.----</strong></div>
        <div id="dayName" class="style1"><strong>---</strong></div>
        <div class="fastSmall">
          <div class="style1"><strong>תחילת הצום</strong></div>
          <div id="fastStart" class="style1"><strong>--:--</strong></div>
        </div>
      </section>
      <section>
        <div id="hebrewTop" class="style1"><strong>---</strong></div>
        <div id="clock" class="style1"><strong>--:--:--</strong></div>
      </section>
      <section class="right">
        <div id="synagogueName" class="style1"><strong>בית הכנסת</strong></div>
        <div class="style1"><strong>פרשת השבוע</strong></div>
        <div id="parasha" class="style1"><strong>---</strong></div>
        <div class="fastBox">
          <div id="fastName" class="style1"><strong>---</strong></div>
          <div id="fastDate" class="fastDate led white"></div>
        </div>
      </section>
    </div>

    <section class="zmanim">
      <div class="zman"><div class="style1"><strong>עלות השחר</strong></div>
		  <div class="style1"><strong>◒</strong></div>
		  <div id="alot" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="style1"><strong>זריחה</strong></div>
		  <div class="style1"><strong>☀</strong></div>
		  <div id="sunrise" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="zlabel led yellow"><strong>
		  <span class="style1">סוף זמן</span><br class="style1">
		  <span class="style1">קריאת שמע</span></strong></div>
		  <div class="style1"><strong>▣</strong></div>
		  <div id="shema" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="style1"><strong>חצות</strong></div>
		  <div class="style1"><strong>◐</strong></div>
		  <div id="chatzot" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="style1"><strong>מנחה גדולה</strong></div>
		  <div class="style1"><strong>☀</strong></div>
		  <div id="minchaGedola" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="style1"><strong>שקיעה</strong></div>
		  <div class="style1"><strong>◓</strong></div>
		  <div id="sunset" class="style1"><strong>--:--</strong></div></div>
      <div class="zman"><div class="style1"><strong>צאת הכוכבים</strong></div>
		  <div class="style1"><strong>✦⋆✦</strong></div>
		  <div id="tzeit" class="style1"><strong>--:--</strong></div></div>
    </section>

    <section class="bottomInfo">
      <div class="info"><div><div class="style1"><strong>הדלקת נרות</strong></div>
		  <div id="candles" class="style1"><strong>--:--</strong></div></div></div>
      <div class="info"><span class="style1"><strong>✡</strong></span><div id="hebrewDate" class="style1">
		  <strong>---</strong></div><span class="style1"><strong>✡</strong></span></div>
      <div class="info"><div><div class="style1"><strong>מוצ״ש</strong></div>
		  <div id="havdalah" class="style1"><strong>--:--</strong></div></div></div>
    </section>

    <section class="schedule">
      <div><span class="style1"><strong>שחרית</strong></span><span id="shacharit" class="white led"></span></div>
      <div><span class="style1"><strong>מנחה</strong></span><span id="mincha" class="white led"></span></div>
      <div><span class="style1"><strong>ערבית</strong></span><span id="maariv" class="white led"></span></div>
    </section>

    <section id="dedication" class="dedication led yellow"></section>
    <section class="tickerRow"><div class="style1"><strong>🔊</strong></div><div class="tickerViewport">
  <div id="ticker" class="style1"><strong>ברוכים הבאים</strong></div></div></section>
  </main>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script src="board.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
